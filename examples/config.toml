# Example MAGI configuration with heterogeneous backends and custom prompts.
# Drop at ~/.config/magi/config.toml (or run `magi --print-default-config`).

[defaults]
temperature = 0.4
max_tokens  = 220
timeout     = 60.0

# ── Providers ─────────────────────────────────────────────────────────
[providers.anthropic]
base_url    = "https://api.anthropic.com/v1/"
api_key_env = "ANTHROPIC_API_KEY"

[providers.ollama]
base_url        = "http://localhost:11434/v1/"
api_key_env     = "OLLAMA_API_KEY"
api_key_default = "ollama"

[providers.openai]
base_url    = "https://api.openai.com/v1/"
api_key_env = "OPENAI_API_KEY"

# Add your own — anything that speaks OpenAI works.
# [providers.my_corp_gateway]
# base_url    = "https://gateway.internal.example.com/v1/"
# api_key_env = "CORP_GATEWAY_KEY"

# ── Agents ────────────────────────────────────────────────────────────
# CASPER stays on Claude — cold, precise. Inline custom prompt below
# layers a skeptical engineering frame over the canonical scientist.
[agents."CASPER-3"]
provider    = "anthropic"
model       = "claude-haiku-4-5"
temperature = 0.2
system_prompt_file = "~/.config/magi/prompts/casper-skeptic.md"

# MELCHIOR runs locally on Ollama — slower, but offline-friendly and the
# cautious one feeling slower-to-respond is fitting.
[agents."MELCHIOR-1"]
provider    = "ollama"
model       = "llama3.2:3b"
temperature = 0.5
max_tokens  = 300

# BALTHASAR on a different cloud provider — heterogeneity makes
# disagreements more interesting.
[agents."BALTHASAR-2"]
provider    = "openai"
model       = "gpt-4o-mini"
temperature = 0.7
